services:
  pytorch:
    container_name: mi24a008-KG-framework-pytorch
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - http_tmp=$http_proxy
        - https_tmp=$https_proxy

    volumes:
      - ..:/workspace
      - hf_cache:/workspace/.cache

    working_dir: /workspace
    command: /bin/bash

    env_file:
      - .env

    tty: true
    stop_signal: SIGINT
    shm_size: 12GB

    # main は GPU0 に固定（BERT + CKY を安定化）
    environment:
      - CUDA_VISIBLE_DEVICES=0

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]

    depends_on:
      - llmjp

  llmjp:
    # vLLM公式 OpenAI互換サーバ用イメージ :contentReference[oaicite:6]{index=6}
    image: vllm/vllm-openai:latest
    container_name: mi24a008-llmjp-vllm

    # 公式が --ipc=host 相当を推奨 :contentReference[oaicite:7]{index=7}
    ipc: host

    # HF cache を main と共有（ボリュームは同じ、マウント先だけ変える）
    volumes:
      - hf_cache:/root/.cache

    env_file:
      - .env

    environment:
      # GPU1 に固定（LLM常駐用）
      # - CUDA_VISIBLE_DEVICES=1
      # HFキャッシュの場所を明示
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface/transformers
      - HF_HUB_ENABLE_HF_TRANSFER=1

    ports:
      - "8000:8000"

    # vLLM OpenAI互換サーバ起動（Dockerでは image の後ろに引数を渡す形が公式） :contentReference[oaicite:8]{index=8}
    # ※ RTX 8000(Turing)想定で dtype は half(fp16) を指定
    command:
      - --model
      - llm-jp/llm-jp-3.1-13b-instruct4
      - --served-model-name
      - llmjp-13b
      - --dtype
      - half
      - --max-model-len
      - "4096"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.90"
      # 必要ならAPIキーを固定（main側クライアントがこのキーを付与）
      - --api-key
      - local-token
      # もし起動時に「trust_remote_code が必要」と言われた場合のみ有効化
      # （vLLM CLI で提供） :contentReference[oaicite:9]{index=9}
      # - --trust-remote-code

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["1"]

volumes:
  hf_cache:
