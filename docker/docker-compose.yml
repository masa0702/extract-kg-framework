services:
  pytorch:
    container_name: mi24a008-KG-framework-pytorch
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - http_tmp=$http_proxy
        - https_tmp=$https_proxy

    volumes:
      - ..:/workspace
      - hf_cache:/workspace/.cache

    working_dir: /workspace
    command: /bin/bash

    env_file:
      - .env

    tty: true
    stop_signal: SIGINT
    shm_size: 12GB

    environment:
      - CUDA_VISIBLE_DEVICES=0
      # ★追加：hf_transfer を使わない（無いと落ちるため）
      - HF_HUB_ENABLE_HF_TRANSFER=0
      # ★追加：HFキャッシュの場所を固定（ログ/再現性のため）
      - HF_HOME=/workspace/.cache/huggingface
      - TRANSFORMERS_CACHE=/workspace/.cache/huggingface/transformers
      - HF_DATASETS_CACHE=/workspace/.cache/huggingface/datasets
      - TOKENIZERS_PARALLELISM=false

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["0"]

    depends_on:
      - llmjp

  llmjp:
    image: vllm/vllm-openai:latest
    container_name: mi24a008-llmjp-vllm
    ipc: host

    volumes:
      - hf_cache:/root/.cache

    env_file:
      - .env

    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface/transformers
      # ★変更：ここも 0 推奨（hf_transfer 無いと落ちる）
      - HF_HUB_ENABLE_HF_TRANSFER=0

    ports:
      - "8000:8000"

    command:
      - --model
      - llm-jp/llm-jp-3.1-13b-instruct4
      - --served-model-name
      - llmjp-13b
      - --dtype
      - half
      - --max-model-len
      - "4096"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.90"
      - --api-key
      - local-token

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ["1"]

volumes:
  hf_cache:
